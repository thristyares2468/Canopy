<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>New tab</title>
    <link rel="stylesheet" href="/src/newtab.css" />
  </head>
  <body>
    <main class="newtab-shell">
      <section class="newtab-focus" aria-labelledby="newtab-greeting">
        <div class="canopy-mark" aria-hidden="true"><span></span><span></span><span></span></div>
        <h1 id="newtab-greeting">Where to?</h1>
        <form action="https://www.google.com/search" method="get" class="google-search">
          <label for="newtab-query" class="sr-only">Search Google</label>
          <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.2-3.2"></path></svg>
          <input id="newtab-query" name="q" type="search" placeholder="Search Google" autocomplete="off" autofocus />
          <kbd>⌘ L</kbd>
        </form>
        <nav class="quick-links" aria-label="Quick links">
          <a href="https://www.google.com"><span>G</span>Google</a>
          <a href="https://mail.google.com"><span>M</span>Gmail</a>
          <a href="https://github.com"><span>⌘</span>GitHub</a>
        </nav>
      </section>
      <p class="newtab-credit">Canopy</p>
    </main>
  </body>
</html>
